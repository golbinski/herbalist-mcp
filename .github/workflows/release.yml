name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  check:
    name: Format + Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: check-cargo-

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2

  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    needs: [check, deny]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary
        run: cp target/x86_64-unknown-linux-gnu/release/herbalist-mcp herbalist-mcp-linux-x86_64

      - name: Generate SHA256 checksum
        run: sha256sum herbalist-mcp-linux-x86_64 > herbalist-mcp-linux-x86_64.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: herbalist-mcp-linux-x86_64

      - name: VirusTotal scan
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: herbalist-mcp-linux-x86_64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            herbalist-mcp-linux-x86_64
            herbalist-mcp-linux-x86_64.sha256
          fail_on_unmatched_files: true

  build-macos-x86:
    name: macOS x86_64
    runs-on: macos-latest
    needs: [check, deny]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-x86-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: macos-x86-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-apple-darwin

      - name: Rename binary
        run: cp target/x86_64-apple-darwin/release/herbalist-mcp herbalist-mcp-macos-x86_64

      - name: Generate SHA256 checksum
        run: shasum -a 256 herbalist-mcp-macos-x86_64 > herbalist-mcp-macos-x86_64.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: herbalist-mcp-macos-x86_64

      - name: VirusTotal scan
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: herbalist-mcp-macos-x86_64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            herbalist-mcp-macos-x86_64
            herbalist-mcp-macos-x86_64.sha256
          fail_on_unmatched_files: true

  build-macos-arm:
    name: macOS aarch64
    runs-on: macos-latest
    needs: [check, deny]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-arm-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: macos-arm-cargo-

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Rename binary
        run: cp target/aarch64-apple-darwin/release/herbalist-mcp herbalist-mcp-macos-aarch64

      - name: Generate SHA256 checksum
        run: shasum -a 256 herbalist-mcp-macos-aarch64 > herbalist-mcp-macos-aarch64.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: herbalist-mcp-macos-aarch64

      - name: VirusTotal scan
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: herbalist-mcp-macos-aarch64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            herbalist-mcp-macos-aarch64
            herbalist-mcp-macos-aarch64.sha256
          fail_on_unmatched_files: true

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    needs: [check, deny]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename binary
        run: cp target/x86_64-pc-windows-msvc/release/herbalist-mcp.exe herbalist-mcp-windows-x86_64.exe

      - name: Generate SHA256 checksum
        run: Get-FileHash herbalist-mcp-windows-x86_64.exe -Algorithm SHA256 | Select-Object -ExpandProperty Hash | Out-File -Encoding ascii herbalist-mcp-windows-x86_64.sha256
        shell: pwsh

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: herbalist-mcp-windows-x86_64.exe

      - name: VirusTotal scan
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: herbalist-mcp-windows-x86_64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            herbalist-mcp-windows-x86_64.exe
            herbalist-mcp-windows-x86_64.sha256
          fail_on_unmatched_files: true
