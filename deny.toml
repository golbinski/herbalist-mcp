[advisories]
version = 2
ignore = []

[licenses]
version = 2
# Permissive licenses we accept
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    # CDLA-Permissive-2.0: used by webpki-roots (Mozilla root CAs)
    "CDLA-Permissive-2.0",
    # MPL-2.0: file-level copyleft only — fine for binary distribution
    "MPL-2.0",
]

# r-efi is MIT OR Apache-2.0 OR LGPL-2.1-or-later; we take MIT/Apache-2.0.
[[licenses.clarify]]
name = "r-efi"
expression = "MIT OR Apache-2.0"
license-files = [{ path = "LICENSE", hash = 0xad410194 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# rmcp is pulled from the official MCP rust-sdk repo
allow-git = [
    "https://github.com/modelcontextprotocol/rust-sdk",
]
