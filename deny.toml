[advisories]
version = 2
ignore = [
    # Transitive deps of fastembed — unmaintained advisories, no known CVE.
    # Can't upgrade without a fastembed release that updates these deps.
    { id = "RUSTSEC-2025-0119", reason = "number_prefix pulled in by indicatif via hf-hub/fastembed" },
    { id = "RUSTSEC-2024-0436", reason = "paste pulled in transitively via fastembed" },
]

[licenses]
version = 2
# Permissive licenses we accept
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    # CDLA-Permissive-2.0: used by webpki-roots (Mozilla root CAs)
    "CDLA-Permissive-2.0",
    # MPL-2.0: file-level copyleft only — fine for binary distribution
    "MPL-2.0",
    # NCSA: University of Illinois open source license (OSI/FSF approved, permissive)
    # Used by libfuzzer-sys (build-dep of rav1e → ravif → image → fastembed)
    "NCSA",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# rmcp is pulled from the official MCP rust-sdk repo
allow-git = [
    "https://github.com/modelcontextprotocol/rust-sdk",
]
